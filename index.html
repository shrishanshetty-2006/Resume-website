<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio & Typing Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-container" style="text-align: center; margin-top: 20px;">
        <img src="photo.png" alt="Profile Picture" class="profile-img">
    </div>

    <div class="toolbar" style="text-align: center; margin: 20px 0;">
        <label for="fontSelect" style="font-weight: bold;">Choose Font: </label>
        <select id="fontSelect" style="padding: 5px; border-radius: 5px;">
            <option value="'Courier New', Courier, monospace">Retro Coding (Monospace)</option>
            <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Modern Clean (Sans-Serif)</option>
            <option value="'Georgia', serif">Classic Elegant (Serif)</option>
        </select>
    </div>

    <div class="typing-section" style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 40px;">
        <div id="textDisplay" class="text-display" style="margin-bottom: 15px; font-weight: 500;"></div>
        <textarea id="textInput" class="text-input" placeholder="Start typing here..." autofocus></textarea>
    </div>

    <script src="script.js"></script>
</body>
</html>
